<!DOCTYPE html>
<html lang="pt-BR">
<head>
<script>
(function(){
  var KEY = "npml-guitar-theme";
  try {
    var saved = localStorage.getItem(KEY);
    var theme = saved || (matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
    document.documentElement.dataset.theme = theme;
  } catch(e) {}
})();
</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Entrar — Central de Estudos</title>
<link rel="stylesheet" href="style.css">
<style>
  /* page-specific token: form error color */
  :root { --danger: #B3452F; }
  @media (prefers-color-scheme: dark){ :root{ --danger:#E08469; } }
  :root[data-theme="light"]{ --danger:#B3452F; }
  :root[data-theme="dark"]{ --danger:#E08469; }

  body {
    min-height:100vh; display:flex; align-items:center; justify-content:center;
    line-height:1.5; padding: 1.5rem;
  }
  .card {
    width:100%; max-width: 380px; background:var(--card); border:1px solid var(--line);
    border-radius:16px; padding: 2rem 1.9rem; box-shadow: var(--shadow);
  }
  .eyebrow { font-family:var(--mono); font-size:.7rem; letter-spacing:.18em; text-transform:uppercase; color:var(--brass); margin:0 0 .6rem; display:flex; align-items:center; gap:.5rem; }
  .eyebrow::before { content:""; width:20px; height:2px; background:var(--brass); display:inline-block; }
  h1 { font-family:var(--serif); font-weight:600; font-size:1.55rem; margin:0 0 .35rem; letter-spacing:-.01em; }
  p.lead { font-size:.92rem; margin:0 0 1.6rem; }

  label { display:block; font-family:var(--mono); font-size:.7rem; letter-spacing:.08em; text-transform:uppercase; color:var(--ink-faint); margin-bottom:.35rem; }
  .field { margin-bottom: 1.1rem; }
  input {
    width:100%; font-family:var(--sans); font-size:.98rem; padding:.65rem .8rem;
    border:1px solid var(--line-strong); border-radius:9px; background:var(--paper-2); color:var(--ink);
    transition: border-color .12s;
  }
  input:focus { outline:none; border-color:var(--brass); }
  input:focus-visible { outline: 2px solid var(--brass); outline-offset: 1px; }

  button.submit {
    width:100%; font-family:var(--sans); font-size:.98rem; font-weight:600; padding:.75rem;
    border:none; border-radius:9px; background:var(--brass); color:#fff; cursor:pointer;
    margin-top:.4rem; transition: background .12s;
  }
  button.submit:hover { background:var(--brass-deep); }
  button.submit:focus-visible { outline:2px solid var(--ink); outline-offset:2px; }

  .error {
    display:none; font-size:.85rem; color:var(--danger); background: color-mix(in srgb, var(--danger) 12%, transparent);
    border:1px solid var(--danger); border-radius:8px; padding:.55rem .7rem; margin-bottom:1.1rem;
  }
  .error.show { display:block; }

  footer { margin-top:1.5rem; text-align:center; font-family:var(--mono); font-size:.72rem; color:var(--ink-faint); }

  .theme-toggle {
    position:fixed; top:1rem; right:1rem; width:2.2rem; height:2.2rem;
    display:grid; place-items:center; background:var(--card); border:1px solid var(--line);
    border-radius:8px; cursor:pointer; font-size:1rem; color:var(--ink-faint);
  }
  .theme-toggle:hover { color:var(--brass); border-color:var(--brass); }
  .theme-toggle:focus-visible { outline:2px solid var(--brass); outline-offset:2px; }
</style>
</head>
<body>
  <button type="button" id="theme-toggle" class="theme-toggle" aria-label="Alternar tema">🌙</button>
  <div class="card">
    <p class="eyebrow">Central de estudos</p>
    <h1>Acesso restrito</h1>
    <p class="lead">Material de estudo de guitarra — entre com o usuário e senha combinados.</p>

    <form id="loginForm" autocomplete="off">
      <div class="error" id="err">Usuário ou senha incorretos.</div>
      <div class="field">
        <label for="user">Usuário</label>
        <input type="text" id="user" name="user" autocomplete="username" required>
      </div>
      <div class="field">
        <label for="pass">Senha</label>
        <input type="password" id="pass" name="pass" autocomplete="current-password" required>
      </div>
      <button type="submit" class="submit">Entrar</button>
    </form>

    <footer>npmlguitar.github.io</footer>
  </div>

<script>
  var AUTH_HASH = "d804344ccedd157b8b89fd87280e435b3607e801c8c85f2803dd5ba5c7a294bc";
  var STORE_KEY = "npml-guitar-auth";
  var MAX_AGE_MS = 90 * 24 * 60 * 60 * 1000; // 90 dias

  async function sha256Hex(str) {
    var buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(str));
    return Array.from(new Uint8Array(buf)).map(function(b){ return b.toString(16).padStart(2,"0"); }).join("");
  }

  function redirectTarget() {
    var params = new URLSearchParams(location.search);
    return params.get("next") || "index.html";
  }

  document.getElementById("loginForm").addEventListener("submit", async function(ev){
    ev.preventDefault();
    var user = document.getElementById("user").value.trim();
    var pass = document.getElementById("pass").value;
    var hash = await sha256Hex(user + ":" + pass);
    if (hash === AUTH_HASH) {
      localStorage.setItem(STORE_KEY, JSON.stringify({ ok:true, ts: Date.now() }));
      location.href = redirectTarget();
    } else {
      document.getElementById("err").classList.add("show");
    }
  });

  // já autenticado? pula direto
  (function(){
    try {
      var saved = JSON.parse(localStorage.getItem(STORE_KEY) || "null");
      if (saved && saved.ok && (Date.now() - saved.ts) < MAX_AGE_MS) {
        location.href = redirectTarget();
      }
    } catch(e) {}
  })();

  // theme toggle
  (function(){
    var THEME_KEY = "npml-guitar-theme";
    var btn = document.getElementById("theme-toggle");
    function apply(theme){
      document.documentElement.dataset.theme = theme;
      btn.textContent = theme === "dark" ? "☀️" : "🌙";
      btn.setAttribute("aria-label", theme === "dark" ? "Mudar para tema claro" : "Mudar para tema escuro");
    }
    apply(document.documentElement.dataset.theme || "light");
    btn.addEventListener("click", function(){
      var next = document.documentElement.dataset.theme === "dark" ? "light" : "dark";
      try { localStorage.setItem(THEME_KEY, next); } catch(e) {}
      apply(next);
    });
  })();
</script>
</body>
</html>
